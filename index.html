<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Kanjirakkatt Family Tree</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="sky">
    <div class="clouds"></div>
  </div>

  <header class="topbar">
    <h1>Kanjirakkatt Family Tree</h1>
    <div class="hint">Hover a balloon for details. Click to release (or fold) its children.</div>
    <div class="hint">Created and maintained by Jojo Kanjirakkatt Thomas, Dallas, USA.</div>
    <button class="reset" id="reset">Reset</button>
  </header>

  <main class="stage" id="stage">
    <div class="viewport" id="viewport">
      <svg class="strings" id="strings" xmlns="http://www.w3.org/2000/svg"></svg>
      <div class="world" id="world"></div>
    </div>
  </main>

  <aside class="detail" id="detail" hidden>
    <button class="close" id="detailClose" aria-label="Close">&times;</button>
    <h2 id="detailName"></h2>
    <dl class="detail-meta" id="detailMeta"></dl>
    <p id="detailInfo"></p>
  </aside>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
